name: CI/CD Pipeline - E-Commerce Microservices

# Declencher le pipeline a chaque push sur main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ==============================
  # JOB 1 : Build et Test Maven
  # ==============================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Recuperer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache Maven pour accelerer les builds
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # 4. Compiler eureka-server
      - name: Build eureka-server
        run: mvn clean package -DskipTests
        working-directory: eureka-server

      # 5. Compiler api-gateway
      - name: Build api-gateway
        run: mvn clean package -DskipTests
        working-directory: api-gateway

      # 6. Compiler product-service
      - name: Build product-service
        run: mvn clean package -DskipTests
        working-directory: product-service

      # 7. Compiler cart-service
      - name: Build cart-service
        run: mvn clean package -DskipTests
        working-directory: cart-service

  # ==============================
  # JOB 2 : Build et Push Docker
  # ==============================
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build  # Attend que le job "build" soit termine
    if: github.ref == 'refs/heads/main'  # Seulement sur la branche main

    steps:
      # 1. Recuperer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Se connecter a Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Builder et pousser eureka-server
      - name: Build and push eureka-server
        uses: docker/build-push-action@v5
        with:
          context: ./eureka-server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/eureka-server:latest

      # 4. Builder et pousser api-gateway
      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest

      # 5. Builder et pousser product-service
      - name: Build and push product-service
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/product-service:latest

      # 6. Builder et pousser cart-service
      - name: Build and push cart-service
        uses: docker/build-push-action@v5
        with:
          context: ./cart-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cart-service:latest

      # 7. Afficher un resume
      - name: Summary
        run: |
          echo "✅ Images Docker poussees sur Docker Hub :"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/eureka-server:latest"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/product-service:latest"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/cart-service:latest"